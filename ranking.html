<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>RANKING</title>
    <link rel="stylesheet" href="ranking.css">
</head>
<body>

<div class="container">

    <div class="header">
        <div class="logo"></div>
        <h1>RANKING</h1>
    </div>

    <div class="button-area">
        <button class="vote-btn" onclick="showVote()">投票する</button>
        <button class="rank-btn" onclick="showRanking()">ランキングを見る</button>
    </div>

<div id="vote" class="content">

        <h2>投票フォーム</h2>

        <label for="anime">曲名を検索</label>

        <input
            type="text"
            id="anime"
            list="animeList"
            placeholder="曲名を入力">

        <datalist id="animeList">
            <option value="愛情と矛先">
            <option value="アウフヘーベン">
            <option value="藍">
            <option value="青と夏">
            <option value="Attitude">
            <option value="あなたに">
            <option value="ア・プリオリ">
            <option value="アボイドノート">
            <option value="アポロドロス">
            <option value="アンゼンパイ">
            <option value="ANTENNA">
            <option value="umbrella">
            <option value="アンラブレス">
            <option value="In the Morning">
            <option value="InsPirATioN">
            <option value="InTerLuDe～白い朝～">
            <option value="インフェルノ">
            <option value="WaLL FloWeR">
            <option value="WanteD!WanteD!">
            <option value="嘘じゃないよ">
            <option value="うブ">
            <option value="えほん">
            <option value="L.P">
            <option value="延々">
            <option value="Oz">
            <option value="おもちゃの兵隊">
            <option value="On My MiND">
            <option value="風と町">
            <option value="我逢人">
            <option value="キコリ時計">
        </datalist>

        <button class="submit">投票する</button>

    </div>

    <!-- ランキング -->
    <div id="ranking" class="content">
        <h2>ランキング</h2>

        <table>
            <tr>
                <th>順位</th>
                <th>作品名</th>
                <th>票数</th>
            </tr>
            <tr>
                <td>1位</td>
                <td>作品A</td>
                <td>150票</td>
            </tr>
            <tr>
                <td>2位</td>
                <td>作品B</td>
                <td>120票</td>
            </tr>
            <tr>
                <td>3位</td>
                <td>作品C</td>
                <td>90票</td>
            </tr>
        </table>
    </div>

</div>

<script>
function showVote() {
    document.getElementById("vote").style.display = "block";
    document.getElementById("ranking").style.display = "none";
}

function showRanking() {
    document.getElementById("ranking").style.display = "block";
    document.getElementById("vote").style.display = "none";
}
</script>

</body>
</html>
